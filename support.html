<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiOperator - Поддержка</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header id="main-header">
        <div class="container">
            <h1>Mobi<span class="highlight">Operator</span></h1>
            <p>Служба поддержки</p>
        </div>
    </header>

    <nav id="main-nav">
        <div class="container">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="tariffs.html">Тарифы</a></li>
                <li><a href="index.html#payment">Оплата</a></li>
                <li><a href="support.html" class="active">Поддержка</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <h2>Как мы можем вам помочь?</h2>
            <div class="support-info">
                <h3>Контакты</h3>
                <p>Телефон горячей линии: <strong>8-800-123-45-67</strong> (круглосуточно)</p>
                <p>Email: <a href="mailto:support@mobioperator.ru">support@mobioperator.ru</a></p>
                <p>Адрес: г. Белгород, ул. Ленина, д. 1</p>
            </div>
            <!-- Пример формы обратной связи -->
            <div class="support-form">
                <h3>Напишите нам</h3>
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="support-name">Ваше имя:</label>
                        <input type="text" id="support-name" name="name">
                    </div>
                    <div class="form-group">
                        <label for="support-email">Email:</label>
                        <input type="email" id="support-email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="support-message">Сообщение:</label>
                        <textarea id="support-message" name="message" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn-pay">Отправить</button>
                </form>
            </div>
        </div>
    </main>

    <footer id="main-footer">
        <div class="container">
            <p>&copy; 2026 MobiOperator. Все права защищены.</p>
        </div>
    </footer>
</body>
</html>
