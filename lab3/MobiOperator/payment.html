<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MobiOperator - Оплата</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <header id="main-header">
        <div class="container">
            <h1>Mobi<span class="highlight">Operator</span></h1>
        </div>
    </header>
    <nav id="main-nav">
        <div class="container">
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="tariffs.html">Тарифы</a></li>
                <li><a href="payment.html">Оплата</a></li>
                <li><a href="support.html">Поддержка</a></li>
            </ul>
        </div>
    </nav>
    <main>
        <div class="container" style="text-align: center; min-height: 300px;">
             <section id="payment">
                <h2>Оплата услуг</h2>
                <form action="payment.html" method="get" class="payment-form">
                    <div class="form-group">
                        <label for="phone-number">Номер телефона:</label>
                        <input type="tel" id="phone-number" name="phone" placeholder="+7 (___) ___-__-__" required>
                    </div>

                    <div class="form-group">
                        <label for="amount">Сумма платежа (руб.):</label>
                        <input type="number" id="amount" name="amount" min="10" value="100" required>
                    </div>

                    <div class="form-group">
                        <label for="payment-method">Способ оплаты:</label>
                        <select id="payment-method" name="method" class="payment-select">
                            <option value="card">Банковская карта</option>
                            <option value="phone">С баланса телефона</option>
                        </select>
                    </div>

                    <button type="submit" class="btn-pay">Оплатить</button>
                </form>
            </section>
        </div>
    </main>
    <footer id="main-footer">
        <div class="container">
            <p>&copy; 2026 MobiOperator</p>
        </div>
    </footer>
</body>
</html>
