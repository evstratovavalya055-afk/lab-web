<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Регистрация</title>
  <link rel="stylesheet" href="styles/main.csss">
  <script src="scripts/script.js"></script>
</head>
<body>
    <div class="container">
        <h3>Для регистрации необходимо указать ваши персональные данные</h3>
        
        <!-- В теге form добавлен обработчик onSubmit="CheckData(); return false;" -->
        <form name="regForm" action="#" method="post" onSubmit="CheckData(); return false;">
            <table>
                <tr>
                    <td>Имя<span class="required">*</span></td>
                    <td><input type="text" id="name" name="name"></td>
                </tr>
                <tr>
                    <td>Организация (компания)</td>
                    <td><input type="text" id="company" name="company"></td>
                </tr>
                <tr>
                    <td>Телефон</td>
                    <td><input type="text" id="phone" name="phone" placeholder="+7 (123) 456-78-90"></td>
                </tr>
                <tr>
                    <td>Адрес эл.почты<span class="required">*</span></td>
                    <td><input type="text" id="email" name="email" placeholder="name@domain.ru"></td>
                </tr>
                <tr>
                    <td colspan="2" class="buttons">
                        <input type="submit" value="Отправить">
                        <input type="reset" value="Очистить">
                    </td>
                </tr>
            </table>
        </form>
        
        <div class="note">* Поля обязательные для заполнения</div>
    </div>
    

</body>
</html>
